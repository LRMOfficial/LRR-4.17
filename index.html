    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                plum: '#D89DE6',
                red: '#DA665D',
                blue: '#8AB9D1',
                straw: '#E2E28A',
                olivine: '#92AE5B',
              }
            },
            fontFamily: {
              sans: ['Comfortaa', 'sans-serif'],
              mono: ['IBM Plex Mono', 'monospace'],
            },
          }
        }
      }
    </script>
    <style>
      html, body {
        width: 100%;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
      }

      body {
        font-family: 'Comfortaa', sans-serif;
        color: #ffffff;
        position: relative;
        min-height: 100vh;
      }

      @keyframes backgroundDrift {
        0% { transform: translate(0, 0) scale(1.1); }
        33% { transform: translate(-1.5%, 1%) scale(1.13); }
        66% { transform: translate(1.5%, -1%) scale(1.1); }
        100% { transform: translate(0, 0) scale(1.1); }
      }

      @keyframes titleEntrance {
        0% {
          opacity: 0;
          transform: scale(0.96) translateY(20px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-title-entrance {
        opacity: 0;
        animation: titleEntrance 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .animate-fade-in-up {
        opacity: 0;
        animation: fadeInUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Global background image setup with the requested background */
      body::before {
        content: "";
        position: fixed;
        top: -10%;
        left: -10%;
        width: 120%;
        height: 120%;
        background-image: url('https://i.imgur.com/Vnqdcto.png');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        z-index: -2;
        opacity: 1;
        animation: backgroundDrift 80s ease-in-out infinite;
        filter: contrast(1.05);
        pointer-events: none;
        will-change: transform;
      }

      /* Simple removal of previous overlay to ensure full background transparency and clarity */
      body::after {
        content: none;
      }

      .mono { font-family: 'IBM Plex Mono', monospace; }
      
      .custom-scrollbar::-webkit-scrollbar { width: 5px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(218, 102, 93, 0.2); border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(218, 102, 93, 0.4); }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #000000; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #555; }
      
      .image-reveal {
        transition: filter 0.8s ease, transform 0.8s ease;
      }

      ::selection {
        background-color: #8AB9D1;
        color: black;
      }

      #root {
        width: 100%;
        overflow-x: hidden;
      }
    </style>
